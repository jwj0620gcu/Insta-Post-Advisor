<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f56040"/>
      <stop offset="50%" stop-color="#d62976"/>
      <stop offset="100%" stop-color="#962fbf"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 광택 -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- 막대 차트 (진단 상징) -->
  <rect x="10" y="36" width="9" height="16" rx="3" fill="#fff" opacity="0.55"/>
  <rect x="23" y="26" width="9" height="26" rx="3" fill="#fff" opacity="0.75"/>
  <rect x="36" y="18" width="9" height="34" rx="3" fill="#fff"/>

  <!-- 상승 화살표 꺾기선 -->
  <polyline points="14,30 27,22 40,14 52,10" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <polygon points="52,10 45,9 51,16" fill="#fff" opacity="0.9"/>
</svg>
